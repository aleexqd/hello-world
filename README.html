<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Finger Shooter MVP</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: Arial;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0.2;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20px;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="score">Score: 0</div>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    const videoElement = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;

    let cursor = { x: 0, y: 0 };

    let target = {
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 30
    };

    function respawnTarget() {
      target.x = Math.random() * window.innerWidth;
      target.y = Math.random() * window.innerHeight;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // target
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(target.x, target.y, target.r, 0, Math.PI * 2);
      ctx.fill();

      // cursor (finger)
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(cursor.x, cursor.y, 10, 0, Math.PI * 2);
      ctx.fill();

      // hit detection
      const dx = cursor.x - target.x;
      const dy = cursor.y - target.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < target.r) {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        respawnTarget();
      }

      requestAnimationFrame(draw);
    }

    draw();

    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7,
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];

        // index finger tip = landmark 8
        const tip = hand[8];

        cursor.x = (1 - tip.x) * window.innerWidth;
        cursor.y = tip.y * window.innerHeight;
      }
    });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement });
      },
      width: 640,
      height: 480,
    });

    camera.start();
  </script>
</body>
</html>
